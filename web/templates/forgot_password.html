{% extends 'base.html' %}
{% block title %}Forgot Password - DirtForever{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card reveal">
        <div class="auth-header">
            <h1 class="auth-title">Forgot Password</h1>
            <p class="auth-sub">Enter your email and we'll send a reset link.</p>
        </div>
        <form method="post" action="/forgot" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-input" required autofocus
                       autocomplete="email" placeholder="you@example.com">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Send Reset Link</button>
        </form>
        <div class="auth-footer">
            <p><a href="/login">Back to Sign In</a></p>
        </div>
    </div>
</section>
{% endblock %}
