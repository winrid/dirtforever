{% extends 'base.html' %}
{% block title %}Reset Password — DirtForever{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card reveal">
        <div class="auth-header">
            <h1 class="auth-title">Reset Password</h1>
            <p class="auth-sub">Choose a new password.</p>
        </div>
        <form method="post" action="/reset/{{ token }}" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="password" class="form-label">New Password</label>
                <input type="password" id="password" name="password" class="form-input" required autofocus
                       autocomplete="new-password" placeholder="At least 6 characters" minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm" class="form-label">Confirm Password</label>
                <input type="password" id="confirm" name="confirm" class="form-input" required
                       autocomplete="new-password" placeholder="Repeat your password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Reset Password</button>
        </form>
    </div>
</section>
{% endblock %}
