name: Build Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller cryptography

      - name: Write version from release tag
        run: |
          echo "${{ github.event.release.tag_name }}" | sed 's/^v//' > VERSION

      - name: Build exe
        run: python build_exe.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DirtForever.exe
