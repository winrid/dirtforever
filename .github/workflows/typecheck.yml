name: Type Check

on:
  pull_request:
    branches: [main]

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        working-directory: web
        run: uv sync --frozen --no-install-project --group dev

      - name: Run mypy
        working-directory: web
        run: uv run mypy server.py
